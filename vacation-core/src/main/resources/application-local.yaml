spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?TimeZone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      jackson:
        time-zone: UTC

  liquibase:
    enabled: true
    change-log: classpath:db.changelog/changelog-master.yaml
