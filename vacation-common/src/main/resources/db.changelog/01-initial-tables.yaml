databaseChangeLog:

  - changeSet:
      id: 1-enable-pgcrypto
      author: bhargav
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS pgcrypto;

  - changeSet:
      id: 2-create-user-action-enum
      author: bhargav
      changes:
        - sql:
            sql: CREATE TYPE user_action_enum AS ENUM ('VIEWED','CLICKED','BOOKED','SAVED');

  - changeSet:
      id: 3-create-users-table
      author: bhargav
      changes:
        - createTable:
            tableName: users
            columns:

              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: varchar(20)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 4-create-user-password-reset
      author: bhargav
      changes:
        - createTable:
            tableName: user_password_reset
            columns:

              - column:
                  name: user_id
                  type: UUID

              - column:
                  name: reset_token
                  type: TEXT

        - addForeignKeyConstraint:
            baseTableName: user_password_reset
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_password_reset_user

  - changeSet:
      id: 5-create-profile-table
      author: bhargav
      changes:
        - createTable:
            tableName: profile
            columns:

              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    unique: true

              - column:
                  name: user_image
                  type: TEXT

              - column:
                  name: first_name
                  type: varchar(30)

              - column:
                  name: last_name
                  type: varchar(30)
              - column:
                  name: email_id
                  type: varchar(50)

              - column:
                  name: location
                  type: varchar(100)

        - addForeignKeyConstraint:
            baseTableName: profile
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_profile_user

  - changeSet:
      id: 6-create-content-used-table
      author: bhargav
      changes:
        - createTable:
            tableName: content_used
            columns:

              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true

              - column:
                  name: profile_id
                  type: UUID

              - column:
                  name: data_id
                  type: UUID

        - addForeignKeyConstraint:
            baseTableName: content_used
            baseColumnNames: profile_id
            referencedTableName: profile
            referencedColumnNames: id
            constraintName: fk_content_profile

  - changeSet:
      id: 7-create-plan-lookup-table
      author: bhargav
      changes:
        - createTable:
            tableName: plan_lookup
            columns:

              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true

              - column:
                  name: profile_id
                  type: UUID

              - column:
                  name: tour_package_id
                  type: UUID

              - column:
                  name: action_time
                  type: timestamp

              - column:
                  name: user_action
                  type: user_action_enum

        - addForeignKeyConstraint:
            baseTableName: plan_lookup
            baseColumnNames: profile_id
            referencedTableName: profile
            referencedColumnNames: id
            constraintName: fk_plan_profile

  - changeSet:
      id: 8-create-feed-table
      author: bhargav
      changes:
        - createTable:
            tableName: feed
            columns:

              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true

              - column:
                  name: profile_id
                  type: UUID

              - column:
                  name: caption
                  type: TEXT

              - column:
                  name: like_count
                  type: INTEGER
                  defaultValueNumeric: 0

              - column:
                  name: comments
                  type: TEXT

              - column:
                  name: created_at
                  type: timestamp

        - addForeignKeyConstraint:
            baseTableName: feed
            baseColumnNames: profile_id
            referencedTableName: profile
            referencedColumnNames: id
            constraintName: fk_feed_profile

  - changeSet:
      id: 9-create-feed-images-table
      author: bhargav
      changes:
        - createTable:
            tableName: feed_images
            columns:

              - column:
                  name: feed_id
                  type: UUID

              - column:
                  name: image
                  type: TEXT

        - addForeignKeyConstraint:
            baseTableName: feed_images
            baseColumnNames: feed_id
            referencedTableName: feed
            referencedColumnNames: id
            constraintName: fk_feed_images